name: Build and publish Hormuz Shock Tracker

on:
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC. The war's moving fast; weekly is too stale.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('setup.R') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R dependencies
        run: Rscript setup.R

      - name: Build DuckDB warehouse
        run: Rscript build_db.R

      - name: Render Quarto site
        run: quarto render

      - name: Commit refreshed data snapshots
        if: github.event_name == 'schedule'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.csv || true
          git diff --quiet --cached || git commit -m "chore: refresh data snapshots [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
