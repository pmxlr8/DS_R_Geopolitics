name: Build and publish Hormuz Shock Tracker

on:
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC. The war's moving fast; weekly is too stale.
    - cron: "0 6 * * *"
  workflow_dispatch:

# Required by actions/deploy-pages — deploys via GitHub's native Pages
# pipeline rather than pushing to a gh-pages branch.
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R package dependencies
        # setup-r-dependencies pulls pre-compiled binaries from Posit's
        # Public Package Manager and installs the required system libs
        # (libpng, libcurl, etc.) via sysreqs. ~10× faster than source
        # compilation and the reason the manual setup.R was timing out.
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::duckdb
            any::dplyr
            any::tidyr
            any::readr
            any::purrr
            any::tibble
            any::stringr
            any::lubridate
            any::WDI
            any::yaml
            any::ggplot2
            any::scales
            any::plotly
            any::htmlwidgets
            any::knitr
            any::rmarkdown

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build DuckDB warehouse
        run: Rscript build_db.R

      - name: Render Quarto site
        run: quarto render

      - name: Commit refreshed data snapshots
        if: github.event_name == 'schedule'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.csv || true
          git diff --quiet --cached || git commit -m "chore: refresh data snapshots [skip ci]"
          git push

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
